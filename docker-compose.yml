services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: zavodgram-db
    environment:
      POSTGRES_DB: zavodgram
      POSTGRES_USER: zavodgram
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zavodgram"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: zavodgram-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API + WebSocket ──
  backend:
    build:
      context: ./zavodgram-backend
      dockerfile: Dockerfile
    container_name: zavodgram-api
    environment:
      DATABASE_URL: postgresql://zavodgram:${DB_PASSWORD:-secret}@postgres:5432/zavodgram?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-too}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_INTERNAL_TOKEN: ${TELEGRAM_INTERNAL_TOKEN:-}
      TELEGRAM_VERIFICATION_TTL_MINUTES: ${TELEGRAM_VERIFICATION_TTL_MINUTES:-15}
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ──
  frontend:
    build:
      context: ./zavodgram-web
      dockerfile: Dockerfile
    container_name: zavodgram-web
    ports:
      - "3081:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
  logs:
